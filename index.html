<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Page</title>
    
    <!-- CSS Code Start -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
    <!-- CSS Code End -->
</head>
<body>

    <!-- HTML Code Start -->
    <div class="card">
        <h1>Khush Amdeed!</h1>
        <p>Yeh ek nihayat simple HTML aur CSS webpage hai jo dekhne mein saaf aur modern lagta hai.</p>
        <a href="#" class="btn">Click Karein</a>
    </div>
    <!-- HTML Code End -->

</body>
</html>
